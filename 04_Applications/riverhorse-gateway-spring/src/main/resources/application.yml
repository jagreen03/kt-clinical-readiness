# application.yml (Base / Production Default)
server:
  port: 8080
  servlet:
    session:
      timeout: 30m
      cookie:
        name: BFF_SESSION
        same-site: lax
        secure: true
        http-only: true
  error:
    include-stacktrace: never
    include-message: never
    include-exception: false

spring:
  application:
    name: riverhorse-gateway-spring
  session:
    store-type: none
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/{action}/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
        provider:
          google:
            issuer-uri: https://accounts.google.com
            user-name-attribute: sub
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://rhuser:rhpass_local_only@localhost:27017/riverhorse?authSource=admin}
      auto-index-creation: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO

proxy:
  internal-api-key: ${INTERNAL_API_KEY}
  services:
    clinical: https://clinical-internal.example.com
    billing: https://billing-internal.example.com

odin:
  bootstrap:
    admin-email: ${ODIN_BOOTSTRAP_ADMIN_EMAIL:}
    lead-developer-email: ${ODIN_BOOTSTRAP_LEAD_DEVELOPER_EMAIL:}
  security:
    verification-window-hours: ${ODIN_SECURITY_VERIFICATION_WINDOW_HOURS:6}
    persona-picker-path: /persona/select
    guest-landing-path: /
